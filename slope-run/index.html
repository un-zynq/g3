<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <link rel="stylesheet" href="unity/style.css" />
    <script src="unity/dummy.js"></script>
    <script src="unity/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/sloperun.json", {
        onProgress: UnityProgress,
        Module: {
          onRuntimeInitialized: function () {
            UnityProgress(gameInstance, "complete");
          },
        },
      });
    </script>
    <script>
      function fixGameView() {
        const gameView = document.getElementById("gameView");
        if (gameView.clientHeight * 1.2 > gameView.clientWidth) {
          gameView.style.height = Math.floor(gameView.clientWidth / 1.2) + "px";
        }
      }
    </script>
  </head>
  <body style="overflow: hidden; margin: 0; padding: 0" onload="fixGameView()">
    <div id="gameView" class="webgl-content" style="position: absolute; width: 100%; height: 100%; margin: 0px; padding: 0px">
      <div id="gameContainer" style="width: 100%; height: 100%; margin: 0px; padding: 0px"></div>
    </div>
  </body>
</html>
